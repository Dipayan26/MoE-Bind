run:
  type: Full_finetune_GPT2
  pretrained_ckpt: checkpoints/demo/gpt2_pretrain/demo_gpt2_pretrain.pt
  mod_pretrained_with_MTP: false

model:
  vocab_size: 31
  block_size: 256
  n_layer: 2
  n_head: 4
  n_embd: 128
  dropout: 0.1
  bias: true

data:
  name: demo_finetune
  dtype: uint16
  preprocessed_train: data/demo/tokenized_ft/demo_ft_train
  preprocessed_val: data/demo/tokenized_ft/demo_ft_val

training:
  learning_rate: 0.0001
  min_lr: 0.00001
  max_iters: 50
  warmup_steps: 5
  eval_iters: 25
  batch_size: 4
  gradient_accumulation_steps: 1
  checkpoint_dir: checkpoints/demo/gpt2_finetune
  out_mod_name: "demo_gpt2_finetune"
  conditional_masking: true

logging:
  project: moebind_demo
  seed: 42
  id: demo_gpt2_finetune

# Run:
# python -m scripts.train --config configs/finetune/demo/gpt2.yaml
