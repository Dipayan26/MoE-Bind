run:
  type: pretrain_MOE_bind

model:
  # MLA + MoE (DeepSeekV3 style) — demo dimensions
  vocab_size: 31
  block_size: 256
  n_layer: 2
  n_head: 4
  n_embd: 128

  # MLA (low-rank KV/Q compression)
  kv_lora_rank: 32
  q_lora_rank: 32
  rope_dim: 16
  bias: true

  # Multi-Token Prediction — disabled for the demo
  mtp_num_heads: 0
  dropout: 0.1

  # Mixture of Experts
  n_experts: 4
  n_experts_per_token: 2
  expert_intermediate_size: 128
  shared_expert_intermediate_size: 128
  use_shared_expert: true

  MOE_route_out: false
  mtp_loss_weight: 0.0
  aux_loss_weight: 0.1

data:
  name: demo_pretrain
  train_bin: data/demo/tokenized/demo_train.bin
  val_bin: data/demo/tokenized/demo_val.bin
  dtype: uint16

training:
  learning_rate: 0.0003
  min_lr: 0.00003
  max_iters: 50
  warmup_steps: 5
  eval_iters: 25
  batch_size: 8
  gradient_accumulation_steps: 1
  checkpoint_dir: checkpoints/demo/deepseek_pretrain
  conditional_masking: false
  out_mod_name: "demo_deepseek_pretrain"

logging:
  project: moebind_demo
  seed: 42
  id: demo_deepseek_pretrain

# Run:
# python -m scripts.train --config configs/pretrain/demo/deepseek.yaml
